<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.register-box{
    width:380px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.register-box h2{
    text-align:center;
    margin-bottom:30px;
    color:#111827;
    font-size:32px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

.input-box input{
    width:100%;
    padding:14px;
    border:2px solid #d1d5db;
    border-radius:12px;
    font-size:16px;
    transition:0.3s;
}

.input-box input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,0.3);
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.register-btn:hover{
    background:#1d4ed8;
    transform:scale(1.02);
}

.login-link{
    text-align:center;
    margin-top:25px;
    font-size:15px;
}

.login-link a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

.error{
    color:red;
    font-size:14px;
    margin-top:5px;
    display:none;
}

</style>
</head>

<body>

<div class="register-box">

    <h2>Đăng ký</h2>

    <form id="registerForm">

        <div class="input-box">

            <label>Tên đăng nhập</label>

            <input type="text"
                   id="username"
                   placeholder="Nhập tên đăng nhập">

            <div class="error"
                 id="usernameError">

                Vui lòng nhập tên đăng nhập

            </div>

        </div>

        <div class="input-box">

            <label>Mật khẩu</label>

            <input type="password"
                   id="password"
                   placeholder="Nhập mật khẩu">

            <div class="error"
                 id="passwordError">

                Vui lòng nhập mật khẩu

            </div>

        </div>

        <button type="submit"
                class="register-btn">

            Đăng ký

        </button>

    </form>

    <div class="login-link">

        Đã có tài khoản?

        <a href="trangchuDANGNHAp.html">
            Đăng nhập
        </a>

    </div>

</div>


<script src="./scripts/handleUser.js"></script>
<script>

const form =
    document.getElementById("registerForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    let username =
        document.getElementById("username");

    let password =
        document.getElementById("password");

    let usernameError =
        document.getElementById("usernameError");

    let passwordError =
        document.getElementById("passwordError");

    let valid = true;

    if(username.value.trim() === ""){

        usernameError.style.display = "block";

        valid = false;

    }
    else{

        usernameError.style.display = "none";

    }

    if(password.value.trim() === ""){

        passwordError.style.display = "block";

        valid = false;

    }
    else{

        passwordError.style.display = "none";

    }

    if(valid){

        if (addUser(username.value.trim(), password.value.trim())) {
            login(username.value.trim(), password.value.trim());
            alert("Đăng ký thành công!");

            window.location.href = "trangchu.html";
        } else {
            alert("Tên đăng nhập đã tồn tại. Vui lòng chọn tên khác.");
        }
        

    }

});

</script>

</body>
</html>
